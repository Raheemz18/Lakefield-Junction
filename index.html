<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lakefield Junction</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">

  <!-- HERO -->
  <section class="text-center py-20 bg-white shadow">
    <h1 class="text-4xl font-bold mb-4">Lakefield Junction</h1>
    <p class="text-lg mb-6">Your local hub for food, shopping & lifestyle</p>
    <a href="#stores" class="bg-black text-white px-6 py-3 rounded-lg">Explore Stores</a>
  </section>

  <!-- STORES -->
  <section id="stores" class="py-16 px-6">
    <h2 class="text-2xl font-bold mb-8 text-center">Featured Spots</h2>

    <div class="grid md:grid-cols-3 gap-6">

      <div class="bg-white p-4 rounded-xl shadow">
        <h3 class="font-bold">Kawali House</h3>
        <p>Flavour-packed meals at great prices</p>
      </div>

      <div class="bg-white p-4 rounded-xl shadow">
        <h3 class="font-bold">Boba Tea Cafe</h3>
        <p>Milkshakes & refreshing drinks</p>
      </div>

      <div class="bg-white p-4 rounded-xl shadow">
        <h3 class="font-bold">Al-Saudi Bakery</h3>
        <p>Quick, fresh bakery favourites</p>
      </div>

    </div>
  </section>

</body>
</html>
